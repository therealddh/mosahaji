<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>JW DASH ClearKey Player</title>

<script src="https://therealddh.github.io/mosahaji/jwplayer.js"></script>

<style>
html,body{
  margin:0;
  height:100%;
  background:#000;
}
#player{
  width:100%;
  height:100vh;
}
</style>
</head>
<body>

<div id="player"></div>

<script>
jwplayer("player").setup({
  width: "100%",
  aspectratio: "16:9",

  playlist: [{
    title: "4K Stream",

    sources: [{
      file: "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/xperu6ixu9/out/v1/31d30c91fc65458789b84209d3fa22e4/cenc.mpd",

      drm: {
        clearkey: {
          keyId: "1f68713028d439ec03be07f56c1d6213",
          key: "20093db6455160fffed4c394def3193d"
        }
      }
    }]
  }],

  controls: true,
  autostart: false,
  stretching: "uniform"
});
</script>

</body>
</html>
